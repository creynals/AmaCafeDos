# C84 (B4): Railway service configuration — amaCafe FRONTEND (Vite static)
#
# Esta config asume que la UI de Railway tiene configurado para este servicio:
#   Service Settings → Source → Root Directory: frontend
#
# Variables de entorno que el servicio frontend espera (Railway UI → Variables):
#
#   PORT                   → Railway lo inyecta; vite preview lee --port $PORT.
#   VITE_API_BASE_URL      → URL pública del backend + /api. Ejemplo:
#                            https://amacafe-backend.up.railway.app/api
#                            (NOTA: variables VITE_* se inlinean al BUNDLE en
#                             build time — cualquier cambio requiere redeploy.)
#
# Build:
#   `npm run build` produce dist/ con el bundle estático ya parametrizado por
#   VITE_API_BASE_URL inyectado al momento del build.
#
# Start:
#   `vite preview` sirve dist/ con un servidor estático mínimo. Suficiente
#   para MPV. Si en futuro se quiere un server HTTP más robusto, swap a
#   `npx serve -s dist -l $PORT` o un nginx container.
#
# IMPORTANTE: 'host 0.0.0.0' es obligatorio para que Railway pueda enrutar
# tráfico hacia el container (sino bind solo a localhost interno).

[build]
builder = "NIXPACKS"
buildCommand = "npm run build"

[deploy]
startCommand = "npx vite preview --host 0.0.0.0 --port $PORT"
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
